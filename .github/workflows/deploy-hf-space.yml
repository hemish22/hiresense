name: Deploy backend to HF Space

# Mirrors this repo to the Hugging Face Space on every push to main.
# HF builds the root Dockerfile (FastAPI backend) automatically.
# Requires repo secret: HF_TOKEN (a write token from huggingface.co/settings/tokens).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://hemish22:${HF_TOKEN}@huggingface.co/spaces/hemish22/hiresense" \
            HEAD:main
