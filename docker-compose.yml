# HireSense AI — full local/VPS stack (backend + frontend)
# Usage: cp .env.example .env  (fill keys)  then  docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=sqlite:////app/data/hiresense.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
